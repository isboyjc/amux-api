root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ."
  bin = "./tmp/main"
  delay = 1000
  exclude_dir = ["tmp", "web", "vendor", "node_modules", "data", "docs", "electron", "scripts"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go"]
  kill_delay = "2s"
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
