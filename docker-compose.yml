# ========================================
# Amux API - Dokploy 部署配置
# ========================================
#
# 🎯 推荐方案：在 Dokploy 面板创建独立的 PostgreSQL 和 Redis
#    优势：删除/重建应用不会影响数据库，数据更安全
#
# 📋 部署步骤：
#   1️⃣  在 Dokploy 创建 PostgreSQL 服务
#       - Service Name: amux-postgres（或其他名称）
#       - Database: amux
#       - Username: amux
#       - Password: 设置强密码并记住
#
#   2️⃣  在 Dokploy 创建 Redis 服务
#       - Service Name: amux-redis（或其他名称）
#
#   3️⃣  创建本 Compose 服务
#       - 连接 GitHub 仓库
#       - Compose Path: docker-compose.yml
#       - 设置以下环境变量：
#
#   4️⃣  必需的环境变量（在 Dokploy 环境变量面板设置）：
#       SQL_DSN=postgresql://amux:你的密码@amux-postgres:5432/amux
#       REDIS_CONN_STRING=redis://amux-redis:6379
#       SESSION_SECRET=用 openssl rand -base64 48 生成
#
#   5️⃣  推荐的环境变量：
#       CRYPTO_SECRET=用 openssl rand -base64 32 生成
#
#   6️⃣  点击 Deploy 部署！
#
# ⚠️  注意：服务名（amux-postgres、amux-redis）要替换成你在 Dokploy 中实际创建的名称
# ========================================

version: '3.8'

services:
  app:
    # 使用 GitHub Container Registry 镜像（推荐，完全免费）
    # 格式: ghcr.io/你的github用户名/仓库名:latest
    # 示例: ghcr.io/isboyjc/amux-api:latest
    image: ghcr.io/isboyjc/amux-api:latest
    
    # 如果要在 Dokploy 本地构建（需要 4GB+ 内存），取消下面注释
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    
    restart: always
    command: --log-dir /app/logs
    expose:
      - "3000"
    volumes:
      - amux_data:/data
      - amux_logs:/app/logs
    environment:
      # ==================== 数据库配置 ====================
      # PostgreSQL 连接字符串（必需）
      # 格式: postgresql://用户名:密码@主机:端口/数据库名
      # 示例: postgresql://amux:yourpass@amux-postgres:5432/amux
      - SQL_DSN=${SQL_DSN}
      
      # ==================== 缓存配置 ====================
      # Redis 连接字符串（必需，用于缓存和会话）
      # 格式: redis://主机:端口 或 redis://:密码@主机:端口
      # 示例: redis://amux-redis:6379
      - REDIS_CONN_STRING=${REDIS_CONN_STRING}
      
      # ==================== 安全配置 ====================
      # 会话加密密钥（必需，多机部署必须设置）
      # 生成方式: openssl rand -base64 48
      - SESSION_SECRET=${SESSION_SECRET}
      
      # Redis 数据加密密钥（推荐设置）
      # 生成方式: openssl rand -base64 32
      - CRYPTO_SECRET=${CRYPTO_SECRET:-}
      
      # ==================== 基础配置 ====================
      # 时区设置
      - TZ=Asia/Shanghai
      
      # 服务端口（默认 3000）
      - PORT=3000
      
      # Gin 运行模式（release=生产模式，debug=调试模式）
      - GIN_MODE=release
      
      # ==================== 性能优化 ====================
      # 启用错误日志记录
      - ERROR_LOG_ENABLED=true
      
      # 启用批量更新（提升数据库写入性能）
      - BATCH_UPDATE_ENABLED=true
      
      # 启用内存缓存（提升响应速度）
      - MEMORY_CACHE_ENABLED=true
      
      # 缓存同步频率（秒，默认 60）
      - SYNC_FREQUENCY=60
      
      # ==================== 可选配置 ====================
      # 流式响应超时时间（秒，默认 300）
      # 如果出现空补全可以增大此值
      - STREAMING_TIMEOUT=${STREAMING_TIMEOUT:-300}
      
      # 前端访问地址（用于回调、通知等）
      # 示例: https://your-domain.com
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  amux_data:
  amux_logs:

networks:
  default:
    name: amux-network
    driver: bridge
